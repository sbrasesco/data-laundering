services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: data-laundering-worker:${WORKER_VERSION:-v1.0.0}
    container_name: dl-worker
    restart: unless-stopped
    network_mode: host          # accede a Redis, gateway y servicios en localhost del VPS
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WORKER_CONCURRENCY=3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
